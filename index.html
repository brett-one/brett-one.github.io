<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bouncing Ball Screensaver</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      background: black;
    }

  </style>
</head>
<body>
  <canvas id="screen"></canvas>

  <script>
    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const ball = {
      x: 200,
      y: 150,
      width: 120,
      height: 54,
      vx: 4.2,
      vy: 3.1,
      color: "#ffffff"
    };

    function getAngleDegrees(vx, vy) {
      let angle = Math.atan2(vy, vx) * 180 / Math.PI;
      if (angle < 0) angle += 360;
      return angle;
    }

    function randomColor() {
      const colors = [
        "#ffffff", "#ff4444", "#44aaff", "#ffee44",
        "#44ff88", "#ff66cc", "#ff9933"
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    function bounceFromWalls() {
      if (ball.x <= 0) {
        ball.x = 0;
        ball.vx = -ball.vx;
        ball.color = randomColor();
      }

      if (ball.x + ball.width >= canvas.width) {
        ball.x = canvas.width - ball.width;
        ball.vx = -ball.vx;
        ball.color = randomColor();
      }

      if (ball.y <= 0) {
        ball.y = 0;
        ball.vy = -ball.vy;
        ball.color = randomColor();
      }

      if (ball.y + ball.height >= canvas.height) {
        ball.y = canvas.height - ball.height;
        ball.vy = -ball.vy;
        ball.color = randomColor();
      }
    }

    const dvdLogo = new Image();
    dvdLogo.src = "./assets/dvd-logo.svg";

    function drawBall() {
      if (dvdLogo.complete) {
        ctx.drawImage(dvdLogo, ball.x, ball.y, ball.width, ball.height);
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ball.x += ball.vx;
      ball.y += ball.vy;

      bounceFromWalls();
      drawBall();


      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
