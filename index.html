<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVD Screensaver V2</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      font-family: Arial, sans-serif;
      color: #00ff99;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      user-select: none;
      z-index: 10;
    }

    #startBtn {
      padding: 6px 14px;
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    #startBtn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #status {
      font-size: 14px;
    }

    #dvdWrapper {
      width: 200px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #dvdLogo {
      max-width: 100%;
      max-height: 100%;
    }

    /* Simple bounce animation (will apply after Start) */
    .bouncing {
      position: relative;
      animation: bounce 3s linear infinite;
    }

    @keyframes bounce {
      0%   { transform: translate(-40vw, -20vh); }
      25%  { transform: translate(40vw, -20vh); }
      50%  { transform: translate(40vw, 20vh); }
      75%  { transform: translate(-40vw, 20vh); }
      100% { transform: translate(-40vw, -20vh); }
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="startBtn" disabled>Start DVD</button>
    <span id="status">Loading image…</span>
  </div>

  <div id="dvdWrapper">
    <img id="dvdLogo" src="/assets/dvd-logo.svg" alt="DVD Logo" />
  </div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");
    const dvdLogo = document.getElementById("dvdLogo");

    dvdLogo.onload = () => {
      statusEl.textContent = "Image loaded. Click Start.";
      startBtn.disabled = false;
    };

    dvdLogo.onerror = () => {
      statusEl.textContent = "Error loading /assets/dvd-logo.svg";
      startBtn.disabled = true;
    };

    startBtn.addEventListener("click", () => {
      startBtn.disabled = true;
      statusEl.textContent = "Running…";
      dvdLogo.classList.add("bouncing");
    });
  </script>
</body>
</html>
