<script>
  const canvas = document.getElementById("screen");
  const ctx = canvas.getContext("2d");
  const startBtn = document.getElementById("startBtn");
  const statusEl = document.getElementById("status");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  function drawTestSquare() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff99";
    ctx.fillRect(canvas.width / 2 - 25, canvas.height / 2 - 25, 50, 50);
  }

  const dvdLogo = new Image();
  dvdLogo.src = "/assets/dvd-logo.svg";  // absolute path

  const dvd = {
    x: 200,
    y: 150,
    width: 120,
    height: 54,
    vx: 4,
    vy: 3
  };

  let running = false;

  function bounceFromWalls() {
    if (dvd.x <= 0) {
      dvd.x = 0;
      dvd.vx = -dvd.vx;
    }
    if (dvd.x + dvd.width >= canvas.width) {
      dvd.x = canvas.width - dvd.width;
      dvd.vx = -dvd.vx;
    }
    if (dvd.y <= 0) {
      dvd.y = 0;
      dvd.vy = -dvd.vy;
    }
    if (dvd.y + dvd.height >= canvas.height) {
      dvd.y = canvas.height - dvd.height;
      dvd.vy = -dvd.vy;
    }
  }

  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(dvdLogo, dvd.x, dvd.y, dvd.width, dvd.height);
  }

  function animate() {
    if (!running) return;

    dvd.x += dvd.vx;
    dvd.y += dvd.vy;
    bounceFromWalls();
    drawFrame();

    requestAnimationFrame(animate);
  }

  dvdLogo.onload = () => {
    statusEl.textContent = "Image loaded. Click Start.";
    startBtn.disabled = false;

    // Show the DVD logo once in the center BEFORE Start
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(
      dvdLogo,
      canvas.width / 2 - dvd.width / 2,
      canvas.height / 2 - dvd.height / 2,
      dvd.width,
      dvd.height
    );
  };

  dvdLogo.onerror = () => {
    statusEl.textContent = "Error loading /assets/dvd-logo.svg";
    startBtn.disabled = true;
    // Show test square instead
    drawTestSquare();
  };

  startBtn.addEventListener("click", () => {
    if (!dvdLogo.complete) {
      statusEl.textContent = "Still loading image…";
      return;
    }
    running = true;
    startBtn.disabled = true;
    statusEl.textContent = "Running…";
    animate();
  });

  // Safety: show test square if loading is slow
  setTimeout(() => {
    if (!dvdLogo.complete) {
      statusEl.textContent = "Taking long to load. Showing test square.";
      drawTestSquare();
    }
  }, 4000);
</script>
