<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVD Screensaver</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #00ff99;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      user-select: none;
    }

    #startBtn {
      padding: 6px 14px;
      background: #00ff99;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }

    #startBtn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #status {
      font-size: 14px;
    }

    canvas {
      display: block;
      background: black;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="startBtn" disabled>Start DVD</button>
    <span id="status">Loading image…</span>
  </div>

  <canvas id="screen"></canvas>

  <script>
    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");
    const ui = document.getElementById("ui");
    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const dvdLogo = new Image();
    dvdLogo.src = "./assets/dvd-logo.png"; // change to .jpg if needed

    const dvd = {
      x: 200,
      y: 150,
      width: 160,
      height: 80,
      vx: 4,
      vy: 3
    };

    let running = false;

    // Brighter colors behind the logo only
    const bgColors = ["#0074FF", "#00FF66", "#FF0033"];
    let bgIndex = 0;

    function bounceFromWalls() {
      let collided = false;

      if (dvd.x <= 0) {
        dvd.x = 0;
        dvd.vx = -dvd.vx;
        collided = true;
      }
      if (dvd.x + dvd.width >= canvas.width) {
        dvd.x = canvas.width - dvd.width;
        dvd.vx = -dvd.vx;
        collided = true;
      }
      if (dvd.y <= 0) {
        dvd.y = 0;
        dvd.vy = -dvd.vy;
        collided = true;
      }
      if (dvd.y + dvd.height >= canvas.height) {
        dvd.y = canvas.height - dvd.height;
        dvd.vy = -dvd.vy;
        collided = true;
      }

      if (collided) {
        bgIndex = (bgIndex + 1) % bgColors.length;
      }
    }

    function drawFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = bgColors[bgIndex];
      ctx.fillRect(dvd.x, dvd.y, dvd.width, dvd.height);

      ctx.drawImage(dvdLogo, dvd.x, dvd.y, dvd.width, dvd.height);
    }

    function animate() {
      if (!running) return;

      dvd.x += dvd.vx;
      dvd.y += dvd.vy;
      bounceFromWalls();
      drawFrame();

      requestAnimationFrame(animate);
    }

    dvdLogo.onload = () => {
      statusEl.textContent = "Image loaded. Click Start.";
      startBtn.disabled = false;

      dvd.x = canvas.width / 2 - dvd.width / 2;
      dvd.y = canvas.height / 2 - dvd.height / 2;
      drawFrame();
    };

    dvdLogo.onerror = () => {
      statusEl.textContent = "Error loading DVD image.";
      startBtn.disabled = true;
    };

    startBtn.addEventListener("click", () => {
      if (!dvdLogo.complete) {
        statusEl.textContent = "Still loading image…";
        return;
      }

      running = true;
      ui.style.display = "none";
      animate();
    });
  </script>
</body>
</html>
