<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DVD Screensaver V2</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #00ff99;
    }

    canvas {
      display: block;
      background: black;
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>

  <script>
    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    const dvdLogo = new Image();
    dvdLogo.src = "./assets/dvd-logo.png"; // or .jpg if that's your file

    const dvd = {
      x: 200,
      y: 150,
      width: 160,
      height: 80,
      vx: 2,  // speed control: lower = slower
      vy: 2
    };

    const bgColors = ["#0074FF", "#00FF66", "#FF0033"]; // bright blue, green, red
    let bgIndex = 0;

    function bounceFromWalls() {
      let collided = false;

      if (dvd.x <= 0) {
        dvd.x = 0;
        dvd.vx = -dvd.vx;
        collided = true;
      }
      if (dvd.x + dvd.width >= canvas.width) {
        dvd.x = canvas.width - dvd.width;
        dvd.vx = -dvd.vx;
        collided = true;
      }
      if (dvd.y <= 0) {
        dvd.y = 0;
        dvd.vy = -dvd.vy;
        collided = true;
      }
      if (dvd.y + dvd.height >= canvas.height) {
        dvd.y = canvas.height - dvd.height;
        dvd.vy = -dvd.vy;
        collided = true;
      }

      if (collided) {
        bgIndex = (bgIndex + 1) % bgColors.length;
      }
    }

    function drawFrame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = bgColors[bgIndex];
      ctx.fillRect(dvd.x, dvd.y, dvd.width, dvd.height);

      ctx.drawImage(dvdLogo, dvd.x, dvd.y, dvd.width, dvd.height);
    }

    function animate() {
      dvd.x += dvd.vx;
      dvd.y += dvd.vy;
      bounceFromWalls();
      drawFrame();

      requestAnimationFrame(animate);
    }

    dvdLogo.onload = () => {
      dvd.x = canvas.width / 2 - dvd.width / 2;
      dvd.y = canvas.height / 2 - dvd.height / 2;
      drawFrame();
      // Auto-start animation once image is ready
      animate();
    };

    dvdLogo.onerror = () => {
      console.error("Error loading DVD image");
    };
  </script>
</body>
</html>
